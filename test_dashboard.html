<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 GoMyParty 自動測試儀表板</title>
<style>
  :root {
    --bg: #07090f;
    --panel: #0e1118;
    --border: #1e2535;
    --accent: #00e5ff;
    --green: #22c55e;
    --yellow: #f5c800;
    --red: #ff4444;
    --purple: #a855f7;
    --text: #e2e8f0;
    --muted: rgba(226,232,240,0.4);
    --font-mono: 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    flex-shrink: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  #header h1 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .05em;
    white-space: nowrap;
  }
  #header h1 span { color: var(--yellow); }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: .72rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  select, input[type=text] {
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 5px 10px;
    font-size: .82rem;
    outline: none;
    cursor: pointer;
  }
  select:focus, input:focus { border-color: var(--accent); }
  option { background: #1a1f2e; }

  .btn {
    padding: 6px 14px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: .82rem;
    font-weight: 700;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.96); }
  .btn-cyan  { background: var(--accent);  color: #000; }
  .btn-green { background: var(--green);   color: #fff; }
  .btn-red   { background: var(--red);     color: #fff; }
  .btn-yellow{ background: var(--yellow);  color: #000; }
  .btn-ghost { background: rgba(255,255,255,.07); border: 1px solid var(--border); color: var(--text); }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background .3s;
  }
  #status-dot.running { background: var(--green); animation: pulse 1s ease-in-out infinite alternate; }
  #status-dot.error   { background: var(--red); }
  @keyframes pulse { from { opacity: 1; } to { opacity: .3; } }

  #step-label {
    font-size: .78rem;
    color: var(--yellow);
    font-weight: 600;
    min-width: 180px;
  }

  /* ── Main layout ── */
  #main {
    flex: 1;
    display: flex;
    gap: 0;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Viewport area ── */
  #viewports {
    flex: 1;
    display: grid;
    gap: 6px;
    padding: 8px;
    overflow: hidden;
    background: #050709;
    /* 動態由 JS 設定 grid-template */
  }

  .vp-slot {
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    min-height: 0;
    min-width: 0;
  }

  /* 老師端突出顯示 */
  .vp-slot.is-teacher {
    border-color: rgba(0,229,255,.35);
    box-shadow: 0 0 0 1px rgba(0,229,255,.15);
  }

  .vp-label {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    background: rgba(0,0,0,.3);
    border-bottom: 1px solid var(--border);
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .vp-label .badge {
    padding: 1px 7px;
    border-radius: 20px;
    font-size: .6rem;
    font-weight: 700;
  }
  .badge-teacher  { background: rgba(0,229,255,.15); color: var(--accent); border: 1px solid rgba(0,229,255,.3); }
  .badge-student  { background: rgba(34,197,94,.12); color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
  .badge-tablet   { background: rgba(168,85,247,.12); color: var(--purple); border: 1px solid rgba(168,85,247,.3); }
  .badge-mobile   { background: rgba(245,200,0,.12); color: var(--yellow); border: 1px solid rgba(245,200,0,.3); }

  .vp-device-frame {
    flex: 1;
    overflow: hidden;
    position: relative;
    min-height: 0;
    background: #020305;
  }

  /* iframe 用 absolute + transform:scale 填滿格子 */
  .vp-device-frame iframe {
    position: absolute;
    top: 0; left: 0;
    border: none;
    display: block;
    transform-origin: top left;
    /* 實際尺寸和 scale 由 JS 動態計算 */
  }

  .iframe-full {
    width: 100% !important;
    height: 100% !important;
  }

  /* ── Log panel ── */
  #log-panel {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow: hidden;
  }

  #log-header {
    flex-shrink: 0;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #log-header span {
    font-size: .72rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  #log-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  #log-body::-webkit-scrollbar { width: 4px; }
  #log-body::-webkit-scrollbar-track { background: transparent; }
  #log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .log-entry {
    display: flex;
    gap: 6px;
    font-size: .7rem;
    line-height: 1.5;
    font-family: var(--font-mono);
    padding: 2px 4px;
    border-radius: 4px;
  }
  .log-entry:hover { background: rgba(255,255,255,.04); }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-icon { flex-shrink: 0; }
  .log-msg  { color: var(--text); word-break: break-word; }
  .log-ok    .log-msg { color: var(--green); }
  .log-warn  .log-msg { color: var(--yellow); }
  .log-error .log-msg { color: var(--red); }
  .log-info  .log-msg { color: var(--accent); }
  .log-step  { background: rgba(245,200,0,.06); }
  .log-step  .log-msg { color: var(--yellow); font-weight: 700; }

  /* ── Step queue ── */
  #steps-panel {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
  }
  .step-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 5px;
    font-size: .68rem;
    font-family: var(--font-mono);
    transition: all .2s;
  }
  .step-row.pending { color: var(--muted); }
  .step-row.active  { background: rgba(245,200,0,.1); color: var(--yellow); font-weight: 700; }
  .step-row.done    { color: rgba(34,197,94,.5); }
  .step-row.failed  { color: var(--red); background: rgba(255,68,68,.05); }
  .step-icon { flex-shrink: 0; width: 14px; text-align: center; }

  /* ── Progress bar ── */
  #progress-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width .4s ease;
    width: 0%;
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <h1>🎮 <span>GoMyParty</span> 測試儀表板</h1>

  <div class="ctrl-group">
    <span class="ctrl-label">遊戲</span>
    <select id="game-select">
      <option value="1">⭐ W1 消除方塊</option>
      <option value="2">⚡ W2 能源管線</option>
      <option value="3">⚫ W3 五子棋對戰</option>
      <option value="4">🎵 W4 節奏合鳴</option>
      <option value="5">🎨 W5 你畫我猜</option>
      <option value="6">⭕ W6 雙人圈圈</option>
      <option value="7">🧠 W7 記憶大考驗</option>
      <option value="8">🚀 W8 環遊大富翁</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">學生數</span>
    <select id="player-count">
      <option value="2">2 組</option>
      <option value="3" selected>3 組</option>
      <option value="4">4 組</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">平台網址</span>
    <input type="text" id="base-url" value="https://teachergomy-web.github.io/gomypartygame" style="width:320px">
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">速度</span>
    <select id="speed-select">
      <option value="1000">正常</option>
      <option value="500" selected>快速</option>
      <option value="200">超快</option>
    </select>
  </div>

  <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
    <div id="status-dot"></div>
    <div id="step-label" style="color:var(--muted)">尚未開始</div>
  </div>

  <div class="ctrl-group">
    <button class="btn btn-green" onclick="startTest()">▶ 開始測試</button>
    <button class="btn btn-yellow" onclick="nextStep()">⏭ 下一步</button>
    <button class="btn btn-ghost" onclick="pauseTest()">⏸ 暫停</button>
    <button class="btn btn-ghost" style="color:#a855f7;border-color:#a855f7" onclick="stopAllAI()">⏹ 停止AI</button>
    <button class="btn btn-red" onclick="resetTest()">↺ 重置</button>
  </div>
</div>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- ── Main ── -->
<div id="main">
  <!-- Viewport grid -->
  <div id="viewports">
    <!-- 動態生成 -->
  </div>

  <!-- Log panel -->
  <div id="log-panel">
    <div id="log-header">
      <span>📋 測試日誌</span>
      <button class="btn btn-ghost" style="padding:2px 8px;font-size:.65rem" onclick="clearLog()">清除</button>
    </div>
    <div id="log-body"></div>
    <div id="steps-panel"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// 配置
// ════════════════════════════════════════
const TEACHER_PW = '3758';
const STEP_DELAY = () => parseInt(document.getElementById('speed-select').value);
const LONG_DELAY = () => STEP_DELAY() * 3;

let iframes     = {};
let testRunning = false;
let testPaused  = false;
let currentStepIdx = 0;
let stepList    = [];
let abortTest   = false;

// ════════════════════════════════════════
// 遊戲定義
// ════════════════════════════════════════
const GAMES = {
  1: { name:'消除方塊',   icon:'⭐', hasLevel: true  },
  2: { name:'能源管線',   icon:'⚡', hasLevel: true  },
  3: { name:'五子棋對戰', icon:'⚫', hasLevel: false },
  4: { name:'節奏合鳴',   icon:'🎵', hasLevel: true  },
  5: { name:'你畫我猜',   icon:'🎨', hasLevel: false },
  6: { name:'雙人圈圈',   icon:'⭕', hasLevel: true  },
  7: { name:'記憶大考驗', icon:'🧠', hasLevel: true  },
  8: { name:'環遊大富翁', icon:'🚀', hasLevel: false },
};

// ════════════════════════════════════════
// AI 腳本（每個遊戲自動操作）
// ════════════════════════════════════════
function stopAllAI() {
  Object.keys(iframes).forEach(id => {
    try {
      const w = getWin(id);
      if (w && typeof w._aiStop === 'function') w._aiStop();
    } catch(e) {}
  });
}

function injectScript(id, code) {
  try {
    const win = getWin(id);
    if (!win) { log(id + ' iframe 不可存取', 'warn'); return false; }
    if (typeof win._aiStop === 'function') win._aiStop();
    const fn = new win.Function(code);
    fn.call(win);
    return true;
  } catch(e) {
    log(id + ' AI 注入失敗：' + e.message, 'error');
    return false;
  }
}

// W4 AI：依模式自動點擊
const AI_W4 = [
  'if(window._aiStop)window._aiStop();',
  'var _t=setInterval(function(){',
  '  try{',
  '    var ai=window._w4AI;',
  '    if(!ai||!ai.isActive())return;',
  '    var mode=ai.getMode(),ents=ai.entities();',
  '    var cv=ai.getCanvas(),H=cv?cv.height:600,W=cv?cv.width:400;',
  '    ents.forEach(function(e){',
  '      if(!e||e.hit||e.miss)return;',
  '      if(mode===3){', // 透視：progress 接近1時點擊
  '        if(e.progress>0.78&&e.progress<1.08&&!e._ah){',
  '          var proj=ai.getM3Proj?ai.getM3Proj(e.track,Math.min(e.progress,1)):{x:W/2,y:H*0.86};',
  '          ai.input(proj.x,proj.y,true);e._ah=true;',
  '        }',
  '      }else if(mode===1){', // 黑塊：到判定區時點
  '        var bl=H-110,by=e.y+(e.h||0);',
  '        if(by>bl-70&&by<bl+90&&!e._ah){',
  '          var tx=ai.getM2TrackX?ai.getM2TrackX(e.track):(e.track*W/6+W/12);',
  '          ai.input(tx,bl+20,true);e._ah=true;',
  '        }',
  '      }else if(mode===2){', // 縮圈：掃描線靠近時點
  '        var sc=ai.getScanY?ai.getScanY():H/2;',
  '        if(e.x&&Math.abs(e.y-sc)<e.radius*1.5&&!e._ah){',
  '          ai.input(e.x,e.y,true);e._ah=true;',
  '        }',
  '      }',
  '    });',
  '  }catch(er){}',
  '},60);',
  'window._aiStop=function(){clearInterval(_t);};'
].join('\n');

// W1 AI
const AI_W1 = [
  'if(window._aiStop)window._aiStop();',
  'var _t=setInterval(function(){',
  '  try{var ai=window._w1AI;if(!ai||!ai.isActive())return;',
  '  var ents=ai.entities().filter(function(e){return e&&e.active&&e.type!=="ghost"&&e.type!=="bomb";});',
  '  if(ents.length>0)ai.input(ents[0].x,ents[0].y);}catch(er){}',
  '},200);',
  'window._aiStop=function(){clearInterval(_t);};'
].join('\n');

// W2 AI
const AI_W2 = [
  'if(window._aiStop)window._aiStop();',
  'var _t=setInterval(function(){',
  '  try{var ai=window._w2AI;if(!ai||!ai.isReady())return;',
  '  var g=ai.getGrid(),cols=ai.getCols(),rows=ai.getRows();if(!g)return;',
  '  var rot=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){',
  '    if(g[r][c]&&["S","D","A","B","E","F"].indexOf(g[r][c].type)<0)rot.push({r:r,c:c});',
  '  }if(rot.length){var p=rot[Math.floor(Math.random()*rot.length)];ai.tapGrid(p.c,p.r);}',
  '  }catch(er){}',
  '},200);',
  'window._aiStop=function(){clearInterval(_t);};'
].join('\n');

// W6 AI
const AI_W6 = [
  'if(window._aiStop)window._aiStop();',
  'var _t=setInterval(function(){',
  '  try{var ai=window._w6AI;if(!ai||!ai.isPlaying())return;',
  '  var js=ai.getJoysticks(),cs=ai.getCursors(),cir=ai.getCircles();if(!js||!cs||!cir)return;',
  '  js.forEach(function(j,i){var tgt=cir[i]||cir[0],cur=cs[i];if(!tgt||!cur)return;',
  '    var dx=tgt.x-cur.x,dy=tgt.y-cur.y,d=Math.hypot(dx,dy);',
  '    if(d<8){ai.setJoystick(i,0,0);}else{ai.setJoystick(i,dx/d,dy/d);}',
  '  });}catch(er){}',
  '},50);',
  'window._aiStop=function(){clearInterval(_t);};'
].join('\n');

// W7 AI
const AI_W7 = [
  'if(window._aiStop)window._aiStop();',
  'var _t=setInterval(function(){',
  '  try{var ai=window._w7AI;if(!ai||ai.isPaused())return;',
  '  if(ai.getFlipPhase()==="PLAY"&&!ai.isFlipLock()){',
  '    var cards=ai.getFlipCards(),um=cards.filter(function(c){return !c.matched&&!c.flipped;});',
  '    if(um.length>=2){ai.clickFlip(um[0]);',
  '      setTimeout(function(){var s=ai.getFlipCards().filter(function(c){return !c.matched&&!c.flipped;});',
  '        var p=s.find(function(c){return c.emojiIdx===um[0].emojiIdx;});',
  '        if(p)ai.clickFlip(p);else if(s[0])ai.clickFlip(s[0]);},450);}',
  '  }}catch(er){}',
  '},500);',
  'window._aiStop=function(){clearInterval(_t);};'
].join('\n');

// W8 AI
const AI_W8 = [
  'if(window._aiStop)window._aiStop();',
  'var _t=setInterval(function(){try{if(typeof rollDice==="function")rollDice();}catch(e){}},1500);',
  'window._aiStop=function(){clearInterval(_t);};'
].join('\n');

const AI_SCRIPTS = { 1:AI_W1, 2:AI_W2, 3:null, 4:AI_W4, 5:null, 6:AI_W6, 7:AI_W7, 8:AI_W8 };

// ════════════════════════════════════════
// iframe / DOM 工具
// ════════════════════════════════════════
const DEVICE_PRESETS = {
  teacher:         { label:'老師端（桌機）' },
  student_desktop: { label:'學生（桌機）'  },
  student_tablet:  { label:'學生（iPad 11"）', w:1194, h:834 },
  student_mobile:  { label:'學生（iPhone 14）', w:390,  h:844 },
};

function getWin(id) {
  const fr = iframes[id];
  if (!fr) return null;
  try { return fr.contentWindow; } catch(e) { return null; }
}
function getDoc(id) {
  try { return getWin(id)?.document; } catch(e) { return null; }
}
function clickIn(id, selector) {
  try {
    const el = getDoc(id)?.querySelector(selector);
    if (el) { el.click(); return true; }
  } catch(e) {}
  return false;
}
function setInput(id, selector, value) {
  try {
    const el = getDoc(id)?.querySelector(selector);
    if (!el) return false;
    el.value = value;
    el.dispatchEvent(new Event('input', { bubbles: true }));
    return true;
  } catch(e) { return false; }
}
function callFn(id, fn, ...args) {
  const win = getWin(id);
  if (win && typeof win[fn] === 'function') { win[fn](...args); return true; }
  return false;
}
function waitFor(cond, timeout=8000) {
  return new Promise((res, rej) => {
    const start = Date.now();
    const check = () => {
      if (abortTest) { rej(new Error('已中止')); return; }
      try { if (cond()) { res(); return; } } catch(e) {}
      if (Date.now() - start > timeout) { rej(new Error('逾時')); return; }
      setTimeout(check, 120);
    };
    check();
  });
}
function sleep(ms) {
  return new Promise(resolve => {
    const poll = setInterval(() => {
      if (!testPaused) { clearInterval(poll); setTimeout(resolve, ms); }
    }, 100);
    if (!testPaused) { clearInterval(poll); setTimeout(resolve, ms); }
  });
}
function setSlotStatus(id, text, color='var(--muted)') {
  const el = document.getElementById('status-' + id);
  if (el) { el.textContent = text; el.style.color = color; }
}

// ════════════════════════════════════════
// 日誌
// ════════════════════════════════════════
function log(msg, type='info') {
  const body = document.getElementById('log-body');
  const icons = { ok:'✅', warn:'⚠️', error:'❌', info:'ℹ️', step:'▶', action:'🖱️' };
  const now = new Date().toLocaleTimeString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const entry = document.createElement('div');
  entry.className = 'log-entry log-' + type;
  entry.innerHTML = '<span class="log-time">' + now + '</span><span class="log-icon">' + (icons[type]||'·') + '</span><span class="log-msg">' + msg + '</span>';
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}
function clearLog() { document.getElementById('log-body').innerHTML = ''; }

// ════════════════════════════════════════
// 步驟 UI
// ════════════════════════════════════════
function renderSteps() {
  const panel = document.getElementById('steps-panel');
  panel.innerHTML = '<div style="font-size:.62rem;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:0 4px 4px">測試步驟</div>';
  stepList.forEach((s, i) => {
    const div = document.createElement('div');
    div.id = 'step-' + i;
    div.className = 'step-row pending';
    div.innerHTML = '<span class="step-icon">○</span><span>' + s.label + '</span>';
    panel.appendChild(div);
  });
}
function setStepState(idx, state) {
  const el = document.getElementById('step-' + idx);
  if (!el) return;
  const icons = { active:'▶', done:'✓', failed:'✗', pending:'○' };
  el.className = 'step-row ' + state;
  el.querySelector('.step-icon').textContent = icons[state] || '○';
  if (state === 'active') {
    el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    document.getElementById('step-label').textContent = stepList[idx]?.label || '';
  }
}
function updateProgress() {
  const done = stepList.filter((_, i) => {
    const el = document.getElementById('step-' + i);
    return el && el.classList.contains('done');
  }).length;
  document.getElementById('progress-bar').style.width = ((done / Math.max(stepList.length, 1)) * 100) + '%';
}

// ════════════════════════════════════════
// Viewport 建立
// ════════════════════════════════════════
function buildViewports() {
  const container = document.getElementById('viewports');
  container.innerHTML = '';
  iframes = {};

  const numStudents = parseInt(document.getElementById('player-count').value);
  const baseUrl = document.getElementById('base-url').value.trim();
  const total = 1 + numStudents;

  let cols = total <= 2 ? 2 : total <= 4 ? 2 : 3;
  let rows = total <= 2 ? 1 : total <= 4 ? 2 : 2;
  container.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  container.style.gridTemplateRows    = 'repeat(' + rows + ', 1fr)';

  const teacherSlot = makeSlot('teacher', '👨\u200D🏫 老師端', 'badge-teacher', baseUrl);
  teacherSlot.classList.add('is-teacher');
  container.appendChild(teacherSlot);

  const devs = [
    { label:'學生1 桌機',   dt:'student_desktop', badge:'badge-student' },
    { label:'學生2 IPAD',   dt:'student_tablet',  badge:'badge-tablet'  },
    { label:'學生3 IPHONE', dt:'student_mobile',  badge:'badge-mobile'  },
    { label:'學生4 桌機',   dt:'student_desktop', badge:'badge-student' },
  ].slice(0, numStudents);

  devs.forEach((dev, i) => {
    container.appendChild(makeSlot('student' + (i + 1), dev.label, dev.badge, baseUrl, dev.dt));
  });

  requestAnimationFrame(scaleIframes);
}

function makeSlot(id, label, badgeClass, baseUrl, deviceType) {
  const slot = document.createElement('div');
  slot.className = 'vp-slot' + (id === 'teacher' ? ' is-teacher' : '');
  slot.id = 'slot-' + id;

  const preset = DEVICE_PRESETS[deviceType] || {};
  const devLabel = preset.label ? '<span style="color:var(--muted);font-size:.6rem;margin-left:4px;">' + preset.label + '</span>' : '';

  slot.innerHTML = '<div class="vp-label">' +
    '<span class="badge ' + badgeClass + '">' + label + '</span>' + devLabel +
    '<span id="status-' + id + '" style="margin-left:auto;font-size:.65rem;color:var(--muted)">待機</span>' +
    '</div><div class="vp-device-frame" id="frame-' + id + '">' +
    '<iframe id="iframe-' + id + '" src="' + baseUrl + '" allow="autoplay; microphone" ' +
    'sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals" ' +
    'onload="onIframeLoad(\'' + id + '\')"></iframe></div>';

  setTimeout(() => {
    iframes[id] = document.getElementById('iframe-' + id);
    if (iframes[id]) iframes[id]._deviceType = deviceType;
  }, 0);

  return slot;
}

function onIframeLoad(id) {
  setTimeout(() => {
    scaleIframes();
    if (id === 'teacher') {
      try {
        const w = getWin('teacher');
        if (w && w.goToTeacherLogin) w.goToTeacherLogin();
      } catch(e) {}
    }
  }, 600);
}

const GAME_DESIGN_W = 1024, GAME_DESIGN_H = 768;
function scaleIframes() {
  Object.keys(iframes).forEach(id => {
    const fr = iframes[id];
    if (!fr) return;
    const frame = document.getElementById('frame-' + id);
    if (!frame) return;
    const fw = frame.clientWidth, fh = frame.clientHeight;
    if (!fw || !fh) return;
    const preset = DEVICE_PRESETS[fr._deviceType] || {};
    const iw = preset.w || GAME_DESIGN_W;
    const ih = preset.h || GAME_DESIGN_H;
    const scale = Math.min(fw / iw, fh / ih);
    fr.style.width  = iw + 'px';
    fr.style.height = ih + 'px';
    fr.style.transform = 'scale(' + scale + ')';
    fr.style.transformOrigin = 'top left';
    fr.style.left = ((fw - iw * scale) / 2) + 'px';
    fr.style.top  = ((fh - ih * scale) / 2) + 'px';
  });
}
window.addEventListener('resize', scaleIframes);

// ════════════════════════════════════════
// 步驟流程（全自動）
// ════════════════════════════════════════
function buildStepList(gameId, numStudents) {
  const g = GAMES[gameId];
  const steps = [];

  steps.push({ label:'等待頁面載入',               fn: stepWaitLoaded });
  steps.push({ label:'老師端：登入並建立房間',      fn: stepTeacherLogin });
  steps.push({ label:'老師端：等待房間建立',         fn: stepCreateRoom });

  for (let i = 1; i <= numStudents; i++) {
    steps.push({ label:'學生' + i + '：自動加入房間', fn: (idx => () => stepStudentJoin(idx))(i) });
  }

  steps.push({ label:'確認所有學生進入大廳',              fn: stepWaitLobby });
  steps.push({ label:'自動選擇遊戲：' + g.icon + ' ' + g.name, fn: () => stepSelectGame(gameId) });
  steps.push({ label:'自動開啟規則頁',                    fn: stepOpenRules });
  steps.push({ label:'自動模擬學生解鎖音效',              fn: stepUnlockStudents });
  steps.push({ label:'老師端：自動按「全班已準備完成，開始！」', fn: stepAutoStart });
  steps.push({ label:'🤖 偵測遊戲啟動，自動注入 AI',     fn: stepInjectAI });

  if (gameId === 4) {
    steps.push({ label:'🔍 W4：監測玩法完成，自動繼續',  fn: stepWatchW4Progress });
  }

  steps.push({ label:'✅ AI 運行中，結算後按「⏭ 下一步」', fn: stepWaitForManualEnd });
  steps.push({ label:'🎉 測試完成',                       fn: stepDone });

  return steps;
}

// 各步驟實作
// ════════════════════════════════════════

async function stepWaitLoaded() {
  log('等待所有 iframe 載入...', 'info');
  await sleep(2000);
  for (const id of Object.keys(iframes)) {
    try {
      await waitFor(() => { const d = getDoc(id); return d && d.readyState === 'complete'; }, 15000);
      setSlotStatus(id, '已載入', 'var(--green)');
      log(id + ' 載入完成', 'ok');
    } catch(e) { log(id + ' 載入逾時', 'warn'); }
  }
  await sleep(STEP_DELAY());
}

async function stepTeacherLogin() {
  log('老師端：前往登入', 'action');
  await sleep(600);
  callFn('teacher', 'goToTeacherLogin') || clickIn('teacher', '[onclick*="goToTeacherLogin"]');
  await sleep(STEP_DELAY());
  setInput('teacher', '#tl-pw', TEACHER_PW);
  await sleep(300);
  callFn('teacher', 'teacherLogin');
  log('老師端：登入完成', 'ok');
  setSlotStatus('teacher', '已登入', 'var(--accent)');
  await sleep(STEP_DELAY());
}

async function stepCreateRoom() {
  log('等待房間建立...', 'info');
  const tw = getWin('teacher');
  try {
    await waitFor(() => tw && tw.state && tw.state.roomCode, 12000);
    window._testRoomCode = tw.state.roomCode;
    log('房間密碼：' + window._testRoomCode, 'ok');
    setSlotStatus('teacher', '房間 #' + window._testRoomCode, 'var(--yellow)');
  } catch(e) { log('房間建立逾時', 'warn'); }
  await sleep(STEP_DELAY());
}

async function doStudentJoinFlow(id, groupNum, symbolIdx) {
  const code = window._testRoomCode;
  if (!code) { log('找不到房間密碼', 'warn'); return false; }

  // 等 Firebase 同步
  log(id + '：等待 Firebase 同步...', 'info');
  try {
    await waitFor(() => {
      const w = getWin(id);
      return w && w._allRoomsCache && Object.keys(w._allRoomsCache).length > 0;
    }, 15000);
    log(id + '：Firebase 已同步', 'ok');
  } catch(e) { log(id + '：Firebase 同步逾時，繼續嘗試', 'warn'); }
  await sleep(300);

  // 前往加入頁
  callFn(id, 'goToJoin');
  await sleep(STEP_DELAY());

  // 等房間卡片
  try {
    await waitFor(() => !!getDoc(id)?.querySelector('.room-card'), 10000);
  } catch(e) { log(id + '：房間列表未出現', 'warn'); return false; }

  // 點房間
  const cards = getDoc(id)?.querySelectorAll('.room-card');
  if (cards && cards.length > 0) {
    cards[0].click();
    log(id + '：點擊房間', 'action');
  } else {
    const w1 = getWin(id);
    if (w1 && w1.selectRoom) w1.selectRoom(code, '1');
    else { log(id + '：找不到房間卡片', 'error'); return false; }
  }
  await sleep(500);

  // 密碼
  try {
    await waitFor(() => {
      const el = getDoc(id)?.getElementById('room-pw-input');
      return el && el.offsetParent !== null;
    }, 5000);
  } catch(e) { log(id + '：密碼框未出現', 'warn'); }
  setInput(id, '#room-pw-input', code);
  await sleep(300);
  callFn(id, 'verifyRoomPassword');
  log(id + '：輸入密碼', 'action');
  await sleep(STEP_DELAY());

  // 選組
  try {
    await waitFor(() => {
      const el = getDoc(id)?.getElementById('join-step-2');
      return el && el.style.display !== 'none' && el.offsetParent !== null;
    }, 8000);
  } catch(e) { log(id + '：選組畫面未出現', 'warn'); }
  await sleep(400);

  const w2 = getWin(id);
  if (w2 && w2.pickGroup) {
    w2.pickGroup(String(groupNum));
    log(id + '：選擇第 ' + groupNum + ' 組', 'action');
  } else {
    const opts = getDoc(id)?.querySelectorAll('.group-opt:not(.taken)');
    if (opts && opts.length > 0) opts[Math.min(groupNum - 1, opts.length - 1)].click();
  }
  await sleep(300);

  // 選頭像
  const SYMBOLS = (w2 && w2.SYMBOLS) || ['🐶','🐱','🦊','🐸','🐰','🐻','🐼','🐨','🐯','🦁'];
  const taken = (w2 && w2.state?.takenSymbols) || [];
  const avail = SYMBOLS.filter(s => !taken.includes(s));
  const sym = avail[symbolIdx % Math.max(avail.length, 1)] || SYMBOLS[0];
  if (w2 && w2.pickSymbol) {
    w2.pickSymbol(sym);
    log(id + '：選頭像 ' + sym, 'action');
  } else {
    const symOpts = getDoc(id)?.querySelectorAll('.symbol-opt:not(.taken)');
    if (symOpts && symOpts.length > 0) symOpts[symbolIdx % symOpts.length]?.click();
  }
  await sleep(300);

  // 確認加入
  callFn(id, 'joinRoom');
  log(id + '：確認加入', 'action');

  try {
    await waitFor(() => {
      const w = getWin(id);
      return w?.pStates?.[w?.state?.perspective]?.joined === true;
    }, 10000);
    setSlotStatus(id, '第' + groupNum + '組 已加入', 'var(--green)');
    log(id + '：成功加入（第' + groupNum + '組 ' + sym + '）', 'ok');
    return true;
  } catch(e) {
    log(id + '：加入逾時', 'warn');
    return false;
  }
}

async function stepStudentJoin(idx) {
  const id = 'student' + idx;
  setSlotStatus(id, '加入中...', 'var(--yellow)');
  await doStudentJoinFlow(id, idx, idx - 1);
  await sleep(STEP_DELAY());
}

async function stepWaitLobby() {
  const numStudents = parseInt(document.getElementById('player-count').value);
  log('等待 ' + numStudents + ' 位學生全部進入大廳...', 'info');
  try {
    await waitFor(() => {
      const tw = getWin('teacher');
      const players = tw?.state?.players || [];
      return players.length >= numStudents;
    }, 20000);
    log('大廳就緒：' + (getWin('teacher')?.state?.players?.length || 0) + ' 位學生', 'ok');
  } catch(e) { log('等待大廳逾時，繼續', 'warn'); }
  await sleep(STEP_DELAY());
}

async function stepSelectGame(gameId) {
  const g = GAMES[gameId];
  log('老師端：選擇遊戲 ' + g.icon + ' ' + g.name, 'action');
  const tw = getWin('teacher');
  if (!tw) { log('老師端無法存取', 'error'); return; }

  // 嘗試進入大廳的遊戲選擇流程
  // index.html 的函式：selectGame(idx) 或 openGameMenu()
  if (tw.openGameMenu) tw.openGameMenu();
  await sleep(400);

  // 點遊戲卡片（0-indexed）
  const gameCards = getDoc('teacher')?.querySelectorAll('.game-card, .kr-game-card, [data-game-id]');
  if (gameCards && gameCards[gameId - 1]) {
    gameCards[gameId - 1].click();
    log('點擊遊戲卡片', 'action');
  } else if (tw.selectGame) {
    tw.selectGame(gameId - 1);
  } else {
    // 直接設定 state
    if (tw.state) tw.state.selectedGame = gameId;
    if (tw.renderLobby) tw.renderLobby();
  }
  await sleep(STEP_DELAY());

  // W4：選玩法1 LV1
  if (gameId === 4) {
    await sleep(400);
    if (tw.lsW4SelectMode) { tw.lsW4SelectMode(1); await sleep(300); }
    if (tw.lsW4SelectLevel) { tw.lsW4SelectLevel(1); await sleep(300); }
    log('W4：選玩法1 LV1', 'ok');
  } else if (GAMES[gameId].hasLevel) {
    await sleep(300);
    if (tw.changeLevel) tw.changeLevel(1);
    await sleep(300);
  }
  log('已選擇 ' + g.name, 'ok');
  await sleep(STEP_DELAY());
}

async function stepOpenRules() {
  log('老師端：開啟規則頁', 'action');
  const tw = getWin('teacher');
  if (tw && tw.showRulesOverlay) {
    tw.showRulesOverlay();

async function stepAutoStart() {
  log('老師端：按「全班已準備完成，開始！」', 'action');
  const tw = getWin('teacher');
  if (!tw) { log('老師端無法存取', 'error'); return; }

  // 嘗試各種開始方式
  let started = false;
  if (tw.closeRulesAndStart) {
    tw.closeRulesAndStart(); started = true;
    log('已呼叫 closeRulesAndStart()', 'ok');
  } else if (tw.tcStartGame) {
    tw.tcStartGame(); started = true;
    log('已呼叫 tcStartGame()', 'ok');
  } else {
    // 直接點按鈕
    const btn = getDoc('teacher')?.querySelector(
      '#rules-start-btn, [onclick*="closeRulesAndStart"], [onclick*="tcStartGame"], [onclick*="全班開始"]'
    );
    if (btn) { btn.click(); started = true; log('已點擊開始按鈕', 'ok'); }
    else log('找不到開始函式或按鈕', 'warn');
  }

  if (started) setSlotStatus('teacher', '🎮 遊戲進行中', 'var(--green)');
  await sleep(STEP_DELAY());
}

async function stepInjectAI() {
  const gameId     = parseInt(document.getElementById('game-select').value);
  const numStudents = parseInt(document.getElementById('player-count').value);
  const script = AI_SCRIPTS[gameId];

  if (!script) {
    log('W' + gameId + ' 無 AI（W3/W5 需人工操作）', 'warn');
    return;
  }

  log('🤖 等待遊戲啟動並注入 AI...', 'info');
  stopAllAI();
  Object.keys(iframes).forEach(id => { if (iframes[id]) iframes[id]._aiInjected = false; });

  const maxWait = 10 * 60 * 1000;
  const startTime = Date.now();

  while (Date.now() - startTime < maxWait && !abortTest) {
    let injected = 0;
    for (let i = 1; i <= numStudents; i++) {
      const id = 'student' + i;
      if (iframes[id]?._aiInjected) { injected++; continue; }
      try {
        const w = getWin(id);
        let ready = false;

        if (gameId === 4) {
          // W4：檢查 game-ui 可見（遊戲已啟動）
          const doc = getDoc(id);
          const gameUi = doc?.getElementById('game-ui');
          const canvas = doc?.getElementById('gameCanvas');
          ready = gameUi && !gameUi.classList.contains('hidden') && canvas;
          if (!ready) ready = w?._w4AI?.isActive?.() === true;
        } else if (gameId === 1) {
          ready = w?._w1AI?.isActive?.() === true;
        } else if (gameId === 2) {
          ready = w?._w2AI?.isReady?.() === true;
        } else if (gameId === 6) {
          ready = w?._w6AI?.isPlaying?.() === true;
        } else if (gameId === 7) {
          ready = (w?._w7AI?.getFlipCards?.()?.length > 0 || w?._w7AI?.getSafeCmds?.()?.length > 0);
        } else if (gameId === 8) {
          ready = w?.gameState?.phase === 'waiting_roll';
        } else {
          const gui = getDoc(id)?.getElementById('game-ui');
          ready = gui && !gui.classList.contains('hidden');
        }

        if (ready) {
          const ok = injectScript(id, script);
          if (ok) {
            iframes[id]._aiInjected = true;
            injected++;
            setSlotStatus(id, '🤖 AI 運行中', 'var(--purple)');
            log('student' + i + ' AI 注入成功', 'ok');
          }
        }
      } catch(e) {}
    }

    if (injected >= numStudents) {
      log('✅ 全部 AI 已注入', 'ok');
      break;
    }
    await sleep(800);
  }
}

// W4 監測玩法完成，自動繼續下一玩法
async function stepWatchW4Progress() {
  log('🔍 W4 監測中...', 'info');
  let lastMode = 0;
  const maxWait = 30 * 60 * 1000;
  const startTime = Date.now();

  while (Date.now() - startTime < maxWait && !abortTest) {
    try {
      // 找「直接進行下一關」按鈕
      const doc = getDoc('teacher');
      const nextBtn = doc?.querySelector('[onclick*="tcW4StartNextMode"], [onclick*="StartNext"]');
      if (nextBtn) {
        const m = (nextBtn.getAttribute('onclick') || '').match(/\d+/);
        const nextMode = m ? parseInt(m[0]) : lastMode + 1;
        if (nextMode > lastMode) {
          lastMode = nextMode;
          const names = { 1:'玩法1', 2:'玩法2', 3:'玩法3' };
          log('🎵 W4 玩法完成！自動進入下一玩法：' + (names[nextMode] || nextMode), 'ok');
          // 自動點下一玩法按鈕
          nextBtn.click();
          await sleep(1000);
          // 重置 AI 注入標記，等新玩法啟動
          Object.keys(iframes).forEach(id => { if (iframes[id]) iframes[id]._aiInjected = false; });
          stepInjectAI().catch(() => {});
        }
      }
    } catch(e) {}
    await sleep(1500);
  }
}

async function stepWaitForManualEnd() {
  log('✅ AI 持續運行。結算後按「⏭ 下一步」結束測試', 'warn');
  setSlotStatus('teacher', '🎮 自由操作中', 'var(--green)');
  testPaused = true;
}

async function stepDone() {
  const gameId = parseInt(document.getElementById('game-select').value);
  log('🎉 測試完成！遊戲：' + GAMES[gameId]?.name, 'step');
  document.getElementById('status-dot').className = '';
  document.getElementById('status-dot').style.background = 'var(--green)';
  document.getElementById('step-label').textContent = '測試完成 ✓';
  testRunning = false;
}

// ════════════════════════════════════════
// 測試控制
// ════════════════════════════════════════
async function startTest() {
  if (testRunning) { log('測試已在執行中', 'warn'); return; }
  abortTest = false; testRunning = true; testPaused = false; currentStepIdx = 0;

  const gameId      = parseInt(document.getElementById('game-select').value);
  const numStudents = parseInt(document.getElementById('player-count').value);

  clearLog();
  log('開始測試 ' + GAMES[gameId]?.icon + ' ' + GAMES[gameId]?.name + '（' + numStudents + ' 位學生）', 'step');

  buildViewports();
  await sleep(1000);

  stepList = buildStepList(gameId, numStudents);
  renderSteps();
  await sleep(300);

  document.getElementById('status-dot').className = 'running';

  for (let i = 0; i < stepList.length; i++) {
    if (abortTest) break;
    currentStepIdx = i;
    const step = stepList[i];
    setStepState(i, 'active');
    log('步驟 ' + (i + 1) + '/' + stepList.length + '：' + step.label, 'step');

    try {
      while (testPaused && !abortTest) await sleep(200);
      if (abortTest) break;
      await step.fn();
      setStepState(i, 'done');
      updateProgress();
    } catch(e) {
      log('步驟失敗：' + e.message, 'error');
      setStepState(i, 'failed');
      updateProgress();
    }
  }

  testRunning = false;
  document.getElementById('status-dot').className = '';
}

function nextStep() {
  if (!testRunning) { log('測試未執行', 'warn'); return; }
  testPaused = false;
  log('手動跳過，執行下一步', 'info');
}

function pauseTest() {
  if (!testRunning) return;
  testPaused = !testPaused;
  document.getElementById('status-dot').className = testPaused ? '' : 'running';
  document.getElementById('step-label').textContent = testPaused ? '⏸ 已暫停' : (stepList[currentStepIdx]?.label || '');
  log(testPaused ? '暫停' : '繼續', 'info');
}

function resetTest() {
  abortTest = true; testRunning = false; testPaused = false;
  document.getElementById('status-dot').className = '';
  document.getElementById('status-dot').style.background = 'var(--muted)';
  document.getElementById('step-label').textContent = '尚未開始';
  document.getElementById('progress-bar').style.width = '0%';
  stopAllAI();
  document.getElementById('steps-panel').innerHTML = '';
  buildViewports();
  log('已重置', 'warn');
}

// ════════════════════════════════════════
// 初始化
// ════════════════════════════════════════
buildViewports();
log('儀表板就緒，按「▶ 開始測試」啟動。', 'info');
log('流程：登入→建房→學生加入→自動選遊戲→開始→AI自動闖關', 'info');
</script>
</body>
</html>
